<!doctype html>

<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>EkoJI - Profile</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-low": "#f3f3f3",
              "primary-fixed": "#e2e2e2",
              "on-primary-fixed": "#1b1b1b",
              error: "#ba1a1a",
              "tertiary-fixed": "#e2e2e2",
              "on-secondary-fixed-variant": "#004f51",
              "on-tertiary": "#ffffff",
              background: "#f9f9f9",
              "on-surface": "#1b1b1b",
              "secondary-fixed-dim": "#56d9dd",
              "on-tertiary-fixed": "#1b1b1b",
              "inverse-surface": "#303030",
              "on-secondary-container": "#006e71",
              "surface-container-highest": "#e2e2e2",
              "surface-container-lowest": "#ffffff",
              "on-primary-container": "#848484",
              "primary-container": "#1b1b1b",
              "on-tertiary-fixed-variant": "#474747",
              "surface-bright": "#f9f9f9",
              "surface-tint": "#5e5e5e",
              surface: "#f9f9f9",
              "inverse-on-surface": "#f1f1f1",
              "surface-container": "#eeeeee",
              "on-primary-fixed-variant": "#474747",
              "tertiary-fixed-dim": "#c6c6c6",
              "on-secondary-fixed": "#002021",
              "surface-container-high": "#e8e8e8",
              "primary-fixed-dim": "#c6c6c6",

              "error-container": "#ffdad6",
              "on-tertiary-container": "#848484",
              "secondary-fixed": "#76f5f9",
              "inverse-primary": "#c6c6c6",
              "surface-variant": "#e2e2e2",
              tertiary: "#000000",
              "outline-variant": "#cfc4c5",
              "on-secondary": "#ffffff",
              "on-error-container": "#93000a",
              secondary: "#00696c",
              outline: "#7e7576",
              "on-primary": "#ffffff",
              "tertiary-container": "#1b1b1b",
              "on-surface-variant": "#4c4546",
              "on-error": "#ffffff",
              "surface-dim": "#dadada",
              "secondary-container": "#73f3f6",
              "on-background": "#1b1b1b",
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem",
            },
            spacing: {
              "margin-desktop": "40px",
              "container-padding": "32px",
              gutter: "24px",
              base: "8px",
              "margin-mobile": "16px",
            },
            fontFamily: {
              "label-sm": ["Inter"],
              "headline-md": ["Inter"],
              "headline-lg-mobile": ["Inter"],
              "headline-lg": ["Inter"],
              "display-kpi": ["Inter"],
              "body-md": ["Inter"],
            },
            fontSize: {
              "label-sm": [
                "12px",
                { lineHeight: "1", letterSpacing: "0.05em", fontWeight: "600" },
              ],
              "headline-md": ["20px", { lineHeight: "1.4", fontWeight: "600" }],
              "headline-lg-mobile": [
                "24px",
                { lineHeight: "1.2", fontWeight: "700" },
              ],
              "headline-lg": [
                "32px",
                {
                  lineHeight: "1.2",
                  letterSpacing: "-0.01em",
                  fontWeight: "700",
                },
              ],
              "display-kpi": [
                "48px",
                {
                  lineHeight: "1.1",
                  letterSpacing: "-0.02em",
                  fontWeight: "700",
                },
              ],
              "body-md": ["14px", { lineHeight: "1.6", fontWeight: "400" }],
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
    </style>
  </head>
  <body class="bg-background text-on-background min-h-screen flex">
    <!-- SideNavBar (Shared Component) -->
    <nav
      class="bg-surface dark:bg-surface-container-low fixed left-0 top-0 h-full w-[280px] border-r border-surface-variant dark:border-outline-variant flex flex-col h-screen py-base px-gutter z-50"
    >
      <!-- Header -->
      <div class="mb-12 mt-6">
        <h1
          class="font-headline-md text-headline-md font-bold text-primary dark:text-inverse-primary tracking-tight"
        >
          EkoJI
        </h1>
        <p class="font-label-sm text-label-sm text-on-surface-variant mt-1">
          Data Intelligence
        </p>
      </div>
      <!-- Main Navigation -->
      <ul class="flex-1 space-y-2">
        <!-- Inactive Tab: Executive -->
        <li>
          <a
            class="flex items-center gap-3 px-4 py-3 rounded-lg font-body-md text-body-md text-on-surface-variant dark:text-on-surface-variant hover:text-primary dark:hover:text-inverse-primary hover:bg-surface-container dark:hover:bg-surface-container-high transition-all duration-150 cursor-pointer"
            href="#"
          >
            <span
              class="material-symbols-outlined text-[20px]"
              data-icon="dashboard"
              >dashboard</span
            >
            <span>Executive</span>
          </a>
        </li>
        <!-- Inactive Tab: Analytics -->
        <li>
          <a
            class="flex items-center gap-3 px-4 py-3 rounded-lg font-body-md text-body-md text-on-surface-variant dark:text-on-surface-variant hover:text-primary dark:hover:text-inverse-primary hover:bg-surface-container dark:hover:bg-surface-container-high transition-all duration-150 cursor-pointer"
            href="#"
          >
            <span
              class="material-symbols-outlined text-[20px]"
              data-icon="analytics"
              >analytics</span
            >
            <span>Analytics</span>
          </a>
        </li>
      </ul>
      <!-- Footer Navigation -->
      <ul class="mt-auto mb-6">
        <!-- Active Tab: Profile -->
        <li>
          <a
            class="flex items-center gap-3 px-4 py-3 font-body-md text-body-md text-primary dark:text-inverse-primary font-bold border-r-2 border-primary dark:border-inverse-primary bg-surface-container-high dark:bg-surface-container-highest transition-all duration-150 cursor-pointer -mr-gutter pr-[calc(1.5rem+2px)]"
            href="#"
          >
            <span
              class="material-symbols-outlined text-[20px]"
              data-icon="account_circle"
              data-weight="fill"
              style="font-variation-settings: &quot;FILL&quot; 1"
              >account_circle</span
            >
            <span>Profile</span>
          </a>
        </li>
      </ul>
    </nav>
    <!-- Main Content Area -->
    <main
      class="ml-[280px] flex-1 flex flex-col items-center py-margin-desktop px-gutter md:px-margin-desktop min-h-screen"
    >
      <div class="w-full max-w-2xl flex flex-col items-center mt-12 mb-16">
        <!-- Avatar Section -->
        <div class="relative mb-6">
          <img
            alt="Profile Avatar"
            class="w-32 h-32 rounded-full object-cover border border-surface-variant bg-surface-container-low"
            data-alt="A minimalist, high-key professional headshot photograph of a senior executive. The subject is framed against an off-white, stark studio background. Lighting is soft, even, and highly contemporary, emphasizing a clinical and sophisticated flat aesthetic. The individual wears crisp, dark minimalist attire creating high contrast. Shot with a sharp 35mm lens for modern editorial feel."
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuApQQBEKbPNr0YxFEoD4jsG2IyPJRkVYNAfftrlBivJaAkLHLr5V5Tr9h493Hv8lI6AYzYfT6_0WKATb70R6zOAcz6d6NQcb1uyF_Hs40fIr5tp87DKcSVrcggy9Mkq8ncXEjKUpvj5YPruMuTNm6N5TxMGjtaq-Yh1PzIueAO6lGFR5V2bhm3dwhQ8AeQEQKmICoOrgVomzZVDzCxerN-Upj8on_u0zUAAc12uzXGUQm88nEdKqJeRObAt3la0yQ7ex8Tp3m8dFqo"
          />
        </div>
        <h2
          class="font-headline-lg text-headline-lg text-primary text-center mb-2"
        >
          Elena Rostova
        </h2>
        <p
          class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest text-center"
        >
          Senior Executive
        </p>
      </div>
      <!-- Settings Cards -->
      <div class="w-full max-w-2xl space-y-4">
        <!-- Card 1: Account Settings -->
        <button
          class="w-full flex items-center justify-between p-container-padding bg-surface-container-lowest border border-surface-variant rounded-lg hover:border-outline transition-colors group cursor-pointer text-left"
        >
          <div class="flex items-center gap-4">
            <div
              class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-on-primary transition-colors"
            >
              <span
                class="material-symbols-outlined"
                data-icon="manage_accounts"
                >manage_accounts</span
              >
            </div>
            <div>
              <h3 class="font-headline-md text-headline-md text-primary">
                Account Settings
              </h3>
              <p class="font-body-md text-body-md text-on-surface-variant mt-1">
                Manage credentials and personal details.
              </p>
            </div>
          </div>
          <span
            class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors"
            >arrow_forward</span
          >
        </button>
        <!-- Card 2: Security -->
        <button
          class="w-full flex items-center justify-between p-container-padding bg-surface-container-lowest border border-surface-variant rounded-lg hover:border-outline transition-colors group cursor-pointer text-left"
        >
          <div class="flex items-center gap-4">
            <div
              class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-on-primary transition-colors"
            >
              <span class="material-symbols-outlined" data-icon="security"
                >security</span
              >
            </div>
            <div>
              <h3 class="font-headline-md text-headline-md text-primary">
                Security
              </h3>
              <p class="font-body-md text-body-md text-on-surface-variant mt-1">
                2FA, active sessions, and access logs.
              </p>
            </div>
          </div>
          <span
            class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors"
            >arrow_forward</span
          >
        </button>
        <!-- Card 3: Notification Preferences -->
        <button
          class="w-full flex items-center justify-between p-container-padding bg-surface-container-lowest border border-surface-variant rounded-lg hover:border-outline transition-colors group cursor-pointer text-left"
        >
          <div class="flex items-center gap-4">
            <div
              class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-on-primary transition-colors"
            >
              <span class="material-symbols-outlined" data-icon="notifications"
                >notifications</span
              >
            </div>
            <div>
              <h3 class="font-headline-md text-headline-md text-primary">
                Notification Preferences
              </h3>
              <p class="font-body-md text-body-md text-on-surface-variant mt-1">
                Configure alerts and daily intelligence briefs.
              </p>
            </div>
          </div>
          <span
            class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors"
            >arrow_forward</span
          >
        </button>
      </div>
      <!-- Action Area -->
      <div class="w-full max-w-2xl mt-12 flex justify-center">
        <button
          class="px-8 py-4 bg-surface-container text-primary font-label-sm text-label-sm uppercase tracking-widest rounded-DEFAULT hover:bg-surface-dim transition-colors flex items-center gap-2"
        >
          <span class="material-symbols-outlined text-[18px]" data-icon="logout"
            >logout</span
          >
          Sign Out
        </button>
      </div>
    </main>
  </body>
</html>
